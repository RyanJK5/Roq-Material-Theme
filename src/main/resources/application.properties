# Sets the Roq theme name. This is picked up automatically by any application
# that has this JAR on the classpath. The value "roq-material" must match
# the directory name used for templates under templates/theme-layouts/ and
# partials/roq-material/ within this module.
site.theme=roq-material

# UUID token used for static asset cache-busting. ${quarkus.uuid} is a
# Quarkus built-in that generates a stable random UUID at build time.
# This follows the same pattern as quarkus-roq-theme-default.
roq-material.uuid=${quarkus.uuid}
